<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Tin Tức | S-Housing Clone', description='Cập nhật các kiến thức, xu hướng và mẹo vặt trang trí không gian sống.', keywords='tin tức nội thất, xu hướng 2026', image='/images/news_hero.png')}"></head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main>
        <section class="interior-hero" th:style="'background-image: url(' + @{${settings.news.hero.bgImage}} + ');'">
            <div class="hero-overlay"></div>
            <h1 th:text="${settings.news.hero.title}">Tin Tức & Kiến Thức</h1>
        </section>

        <section class="page-content container">
            <div class="services-grid">
                <div th:each="article : ${settings.news.articles}" class="project-card">
                    <div class="project-img-wrapper">
                        <img th:src="@{${article.image}}" th:alt="${article.title}" class="project-img" />
                    </div>
                    <div class="project-content">
                        <span style="color: var(--primary-color); font-size: 14px; font-weight: 600;" th:text="${article.category}">CATEGORY</span>
                        <h3 style="margin-top: 10px;" th:text="${article.title}">Article Title</h3>
                        <p th:text="${article.desc}">Article description...</p>
                        <a href="#" style="display: inline-block; margin-top: 15px; font-weight: bold; color: var(--primary-color);">Đọc thêm -></a>
                    </div>
                </div>
            </div>
        </section>
        <!-- Dynamic CTA Banner -->
        <section class="cta-banner">
            <div class="container">
                <h2 th:text="${settings.index.cta.title}">Sẵn Sàng Kiến Tạo Không Gian Của Bạn?</h2>
                <p th:text="${settings.index.cta.subtitle}">Nhận ngay bản vẽ phác thảo...</p>
                <a th:href="@{/lien-he}" class="btn btn-primary btn-large btn-glow" style="border-radius: 50px; font-size: 18px;" th:text="${settings.index.cta.btnLabel}">Liên Hệ Tư Vấn Miễn Phí</a>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
