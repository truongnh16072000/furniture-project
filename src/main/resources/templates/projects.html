<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Dự Án Đã Thực Hiện | TT. Furniture Clone', description='Bộ sưu tập các dự án khủng, biệt thự, nhà phố mang thương hiệu TT. Furniture.', keywords='dự án nội thất', image='/images/projects_hero.png')}"></head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main>
        <section class="interior-hero" th:style="|background-image: url('@{${settings.projects.hero.bgImage}}');|">
            <div class="hero-overlay"></div>
            <h1 th:utext="${settings.projects.hero.title}">Dự Án Nổi Bật</h1>
        </section>

        <section class="page-content container">
            <div th:each="section, iter : ${settings.projects.sections}" th:style="${iter.index > 0} ? 'margin-top: 100px;' : ''">
                <div class="content-block text-center" style="margin-bottom: 60px;">
                    <h2 style="font-size: 32px; color: var(--secondary-color);" th:text="${section.title}">Section Title</h2>
                    <p style="color: var(--text-light); max-width: 700px; margin: 0 auto;" th:text="${section.subtitle}">Section subtitle...</p>
                </div>
                <div class="services-grid">
                    <div th:each="item : ${section.items}" class="project-card" 
                         th:data-images="${#strings.arrayJoin(item.images, ',')}"
                         th:data-title="${item.title}"
                         onclick="openProjectLightbox(this)"
                         style="cursor: pointer;">
                        <div class="project-img-wrapper">
                            <img th:src="@{${item.images[0]}}" th:alt="${item.title}" class="project-img" />
                        </div>
                        <div class="project-content">
                            <h3 th:text="${item.title}">Project Title</h3>
                            <p th:text="${item.desc}">Project description...</p>
                            <span class="view-details">Xem chi tiết</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Dynamic CTA Banner -->
        <section class="cta-banner">
            <div class="container">
                <h2 th:text="${settings.index.cta.title}">Sẵn Sàng Kiến Tạo Không Gian Của Bạn?</h2>
                <p th:text="${settings.index.cta.subtitle}">Nhận ngay bản vẽ phác thảo...</p>
                <a th:href="@{/lien-he}" class="btn btn-primary btn-large btn-glow" style="border-radius: 50px; font-size: 18px;" th:text="${settings.index.cta.btnLabel}">Liên Hệ Tư Vấn Miễn Phí</a>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/lightbox :: lightbox}"></div>
</body>
</html>
