<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="consultation">
    <!-- Consultation Modal -->
    <div id="consultationModal" class="consultation-modal" onclick="if(event.target === this) closeConsultationModal()">
        <div class="modal-content">
            <span class="modal-close" onclick="closeConsultationModal()">&times;</span>
            
            <div class="modal-header">
                <h2>Nhận Tư Vấn Miễn Phí</h2>
                <p>Để lại thông tin, đội ngũ kiến trúc sư của TT. Furniture sẽ liên hệ hỗ trợ bạn trong vòng 15 phút.</p>
            </div>
            
            <form th:action="@{/lien-he}" method="POST" class="modal-form">
                <div class="form-group">
                    <label>Họ và tên *</label>
                    <input type="text" name="name" placeholder="Ví dụ: Nguyễn Văn A" required />
                </div>
                <div class="form-group">
                    <label>Số điện thoại *</label>
                    <input type="tel" name="phone" placeholder="Ví dụ: 0901234567" required />
                </div>
                <button type="submit" class="btn btn-primary btn-full">Gửi Yêu Cầu Tư Vấn</button>
            </form>
            
            <div class="modal-divider">
                <span>HOẶC</span>
            </div>
            
            <div class="modal-actions">
                <a th:href="${settings.site.zalo}" class="btn-zalo" target="_blank">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M21.054 9.177c-.945-3.033-3.957-5.32-7.48-5.32-4.577 0-8.288 3.39-8.288 7.568 0 2.21 1.051 4.195 2.724 5.568-1.07.973-1.298 2.012-1.118 2.502.261.708 1.151.785 2.551-.252 1.34-1.01 1.8-1.157 2.193-1.157.63.14 1.284.223 1.956.223 4.577 0 8.288-3.39 8.288-7.568 0-1.066-.757-2.31-1.826-1.564z"/>
                    </svg>
                    Chat Zalo Ngay
                </a>
            </div>
        </div>
    </div>

    <style>
        .consultation-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .consultation-modal.active {
            display: flex;
            opacity: 1;
        }

        .consultation-modal .modal-content {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .consultation-modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--primary-color);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-size: 28px;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .modal-header p {
            color: var(--text-light);
            font-size: 15px;
            line-height: 1.5;
        }

        .modal-form .form-group {
            margin-bottom: 20px;
        }

        .modal-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--secondary-color);
        }

        .modal-form input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-full {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .modal-divider {
            text-align: center;
            position: relative;
            margin: 25px 0;
        }

        .modal-divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #eee;
        }

        .modal-divider span {
            position: relative;
            background: white;
            padding: 0 15px;
            color: #ccc;
            font-size: 12px;
            font-weight: 700;
        }

        .btn-zalo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #0068FF;
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-weight: 700;
            transition: var(--transition);
        }

        .btn-zalo:hover {
            background: #0056d2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 104, 255, 0.2);
        }
    </style>

    <script>
        function openConsultationModal() {
            const modal = document.getElementById('consultationModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeConsultationModal() {
            const modal = document.getElementById('consultationModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</div>
</body>
</html>
