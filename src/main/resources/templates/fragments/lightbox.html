<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="lightbox">
    <!-- Project Lightbox Modal -->
    <div id="projectLightbox" class="project-lightbox" onclick="if(event.target === this) closeProjectLightbox()">
        <span class="lightbox-close" onclick="closeProjectLightbox()">&times;</span>
        
        <button class="lightbox-nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
        <button class="lightbox-nav-btn next" onclick="changeSlide(1)">&#10095;</button>
        
        <div class="lightbox-content">
            <div class="lightbox-slider-container">
                <div id="lightboxSlider" class="lightbox-slider">
                    <!-- Images will be injected here -->
                </div>
            </div>
            
            <div class="lightbox-info">
                <h3 id="lightboxTitle" style="color: var(--primary-color); margin: 0; font-size: 24px;">Project Title</h3>
                <div class="lightbox-counter" style="color: white; font-weight: 600;">
                    <span id="lbCurrentIndex">1</span> / <span id="lbTotalCount">5</span>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        let currentImages = [];
        let currentIndex = 0;

        function openProjectLightbox(element) {
            const imagesStr = element.getAttribute('data-images');
            const title = element.getAttribute('data-title');
            
            if (!imagesStr) return;
            
            currentImages = imagesStr.split(',');
            currentIndex = 0;
            
            document.getElementById('lightboxTitle').innerText = title;
            document.getElementById('lbTotalCount').innerText = currentImages.length;
            
            // Pre-inject images
            const slider = document.getElementById('lightboxSlider');
            slider.innerHTML = '';
            currentImages.forEach((imgSrc, index) => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.alt = `Slide ${index + 1}`;
                slider.appendChild(img);
            });

            updateLightbox();
            
            document.getElementById('projectLightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProjectLightbox() {
            document.getElementById('projectLightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            const slider = document.getElementById('lightboxSlider');
            if (slider) {
                slider.style.transform = `translateX(-${currentIndex * 100}%)`;
                document.getElementById('lbCurrentIndex').innerText = currentIndex + 1;
            }
        }

        function changeSlide(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = currentImages.length - 1;
            if (currentIndex >= currentImages.length) currentIndex = 0;
            updateLightbox();
        }

        // Key listeners
        document.addEventListener('keydown', function(event) {
            const lb = document.getElementById('projectLightbox');
            if (lb && lb.classList.contains('active')) {
                if (event.key === "Escape") closeProjectLightbox();
                if (event.key === "ArrowLeft") changeSlide(-1);
                if (event.key === "ArrowRight") changeSlide(1);
            }
        });
    </script>
</div>
</body>
</html>
