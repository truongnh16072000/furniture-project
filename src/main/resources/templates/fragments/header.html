<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="site-header" id="siteHeader">
    <div class="container">
        <div class="header-inner">
            <div class="header-logo">
                <a th:href="@{/}">
                    <h2 th:text="${settings.site.name}">S<span class="logo-dot">.</span>Housing</h2>
                </a>
            </div>
            
            <nav class="header-nav" id="headerNav">
                <ul>
                    <li th:each="item : ${settings.nav}">
                        <a th:href="@{${item.url}}" class="nav-link" th:text="${item.label}">Trang Chủ</a>
                    </li>
                </ul>
            </nav>
            
            <div class="header-action">
                <a th:href="'tel:' + ${settings.site.phone}" class="btn btn-primary pulse-btn" th:text="'Nhận Tư Vấn'">Nhận Tư Vấn</a>
                <button class="mobile-menu-toggle" id="mobileMenuBtn" aria-label="Mở menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Highlight current active link
            const currentPath = window.location.pathname.replace(/\/$/, '') || '/';
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                const linkUrl = new URL(link.href, window.location.origin);
                const linkPath = linkUrl.pathname.replace(/\/$/, '') || '/';
                
                if (linkPath === currentPath || (linkPath !== '/' && currentPath.startsWith(linkPath))) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });

            // Mobile Menu Toggle
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const headerNav = document.getElementById('headerNav');
            
            if(mobileBtn && headerNav) {
                mobileBtn.addEventListener('click', () => {
                    headerNav.classList.toggle('active');
                    mobileBtn.classList.toggle('open');
                });
            }

            // Shrink header on scroll
            const header = document.getElementById('siteHeader');
            const SCROLL_THRESHOLD = 50;
            
            if(header) {
                const onScroll = () => {
                    if (window.scrollY > SCROLL_THRESHOLD) {
                        header.classList.add('scrolled');
                    } else {
                        header.classList.remove('scrolled');
                    }
                };
                window.addEventListener('scroll', onScroll);
                onScroll(); // initial check
            }
        });
    </script>
</header>
</body>
</html>
