<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="site-header" id="siteHeader">
    <div class="container">
        <div class="header-inner">
            <div class="header-logo">
                <a th:href="@{/}">
                    <h2 th:text="${settings.site.name}">S<span class="logo-dot">.</span>Housing</h2>
                </a>
            </div>
            
            <nav class="header-nav" id="headerNav">
                <ul>
                    <li th:each="item : ${settings.nav}">
                        <a th:href="@{${item.url}}" class="nav-link" th:text="${item.label}">Trang Chủ</a>
                    </li>
                </ul>
            </nav>
            
            <div class="header-action">
                <a href="javascript:void(0)" onclick="openConsultationModal()" class="btn btn-primary pulse-btn">
                    <span class="btn-text" th:text="'Nhận Tư Vấn'">Nhận Tư Vấn</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M20 10.999h2C22 5.869 18.127 2 12.99 2v2C17.052 4 20 6.943 20 10.999z"/><path d="M13 8c2.103 0 3 .897 3 3h2c0-3.225-1.775-5-5-5v2zm3.422 5.443a1.001 1.001 0 0 0-1.391.043l-2.393 2.461c-.576-.11-1.734-.471-2.926-1.66-1.192-1.193-1.553-2.354-1.66-2.926l2.459-2.394a1 1 0 0 0 .043-1.391L6.859 3.513a1 1 0 0 0-1.391-.087l-2.17 1.861a1 1 0 0 0-.29.649c-.015.25-.301 6.172 4.291 10.766C11.305 20.707 16.323 21 17.705 21c.202 0 .326-.006.359-.008a.992.992 0 0 0 .648-.291l1.86-2.171a1 1 0 0 0-.086-1.391l-4.064-3.696z"/>
                    </svg>
                </a>
                <button class="mobile-menu-toggle" id="mobileMenuBtn" aria-label="Mở menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Highlight current active link
            const currentPath = window.location.pathname.replace(/\/$/, '') || '/';
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                const linkUrl = new URL(link.href, window.location.origin);
                const linkPath = linkUrl.pathname.replace(/\/$/, '') || '/';
                
                if (linkPath === currentPath || (linkPath !== '/' && currentPath.startsWith(linkPath))) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });

            // Mobile Menu Toggle
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const headerNav = document.getElementById('headerNav');
            
            if(mobileBtn && headerNav) {
                mobileBtn.addEventListener('click', () => {
                    headerNav.classList.toggle('active');
                    mobileBtn.classList.toggle('open');
                });
            }

            // Shrink header on scroll
            const header = document.getElementById('siteHeader');
            const SCROLL_THRESHOLD = 50;
            
            if(header) {
                const onScroll = () => {
                    if (window.scrollY > SCROLL_THRESHOLD) {
                        header.classList.add('scrolled');
                    } else {
                        header.classList.remove('scrolled');
                    }
                };
                window.addEventListener('scroll', onScroll);
                onScroll(); // initial check
            }
        });
    </script>
</header>
</body>
</html>
