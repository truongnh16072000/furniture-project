<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title, description, keywords, image)">
    <!-- Meta tags for SEO & Charset -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <meta name="description" th:content="${description} ?: 'S-Housing Clone - Professional Interior Design & Furniture Services'" />
    <meta name="keywords" th:content="${keywords} ?: 'thiết kế nội thất, thi công nội thất, s-housing, furniture, interior design'" />
    
    <!-- Open Graph (Facebook/Social Media) -->
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:type" content="website" />
    <meta property="og:title" th:content="${title} ?: 'Professional Interior Design & Furniture Services'" />
    <meta property="og:description" th:content="${description} ?: 'We provide end-to-end design and construction with 4D VR tech and Feng Shui principles.'" />
    <meta property="og:url" th:content="${url} ?: 'https://s-housing-clone.local'" />
    <meta property="og:site_name" content="Nội Thất S-Housing Clone" />
    <meta property="og:image" th:content="${image} ?: @{/images/hero.png}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" th:content="${title} ?: 'Professional Interior Design & Furniture Services'" />
    <meta name="twitter:description" th:content="${description} ?: 'We provide end-to-end design and construction with 4D VR tech and Feng Shui principles.'" />
    <meta name="twitter:image" th:content="${image} ?: @{/images/hero.png}" />
    
    <title th:text="${title} ?: 'S-Housing Clone | Interior Design'">S-Housing Clone</title>
    
    <!-- CSS and Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    
    <!-- Structured Data Script (JSON-LD for LocalBusiness / Organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FurnitureStore",
      "name": "Nội Thất S-Housing Clone",
      "image": "https://yourdomain.com/images/hero.png",
      "@id": "",
      "url": "https://yourdomain.com",
      "telephone": "+84 90 123 4567",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Main Street",
        "addressLocality": "Ho Chi Minh City",
        "postalCode": "700000",
        "addressCountry": "VN"
      },
      "priceRange": "$$$"
    }
    </script>
</head>
</html>
