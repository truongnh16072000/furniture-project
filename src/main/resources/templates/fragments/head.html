<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title, description, keywords, image)">
    <!-- Meta tags for SEO & Charset -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <meta name="description" th:content="${description} ?: ${settings.index.hero.subtitle}" />
    <meta name="keywords" th:content="${keywords} ?: 'thiết kế nội thất, thi công nội thất, s-housing, furniture, interior design'" />
    
    <!-- Open Graph (Facebook/Social Media) -->
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:type" content="website" />
    <meta property="og:title" th:content="${title} ?: ${settings.site.name}" />
    <meta property="og:description" th:content="${description} ?: ${settings.index.hero.subtitle}" />
    <meta property="og:url" th:content="${url} ?: 'https://s-housing-clone.local'" />
    <meta property="og:site_name" th:content="${settings.site.name}" />
    <meta property="og:image" th:content="${image} ?: @{${settings.index.hero.bgImage}}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" th:content="${title} ?: ${settings.site.name}" />
    <meta name="twitter:description" th:content="${description} ?: ${settings.index.hero.subtitle}" />
    <meta name="twitter:image" th:content="${image} ?: @{${settings.index.hero.bgImage}}" />
    
    <title th:text="${title} ?: ${settings.site.name} + ' | Interior Design'">TT. Furniture Clone</title>
    
    <!-- CSS and Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    
    <!-- Structured Data Script (JSON-LD for LocalBusiness / Organization) -->
    <script type="application/ld+json" th:inline="javascript">
    {
      "@context": "https://schema.org",
      "@type": "FurnitureStore",
      "name": [[${settings.site.name}]],
      "image": [[${settings.index.hero.bgImage}]],
      "url": "https://ttfurniture-clone.vn",
      "telephone": [[${settings.site.phone}]],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": [[${settings.site.address}]],
        "addressLocality": "Ho Chi Minh City",
        "addressCountry": "VN"
      },
      "priceRange": "$$$"
    }
    </script>

</head>
</html>
