<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Về Chúng Tôi | TT. Furniture Clone', description='Tìm hiểu về lịch sử, sứ mệnh và đội ngũ kiến trúc sư của TT. Furniture.', keywords='về chúng tôi, s-housing, kiến trúc sư', image='/images/about_hero.png')}"></head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main>
        <section class="interior-hero" th:style="|background-image: url('@{${settings.about.hero.bgImage}}');|">
            <div class="hero-overlay"></div>
            <h1 th:utext="${settings.about.hero.title}">Về Chúng Tôi</h1>
        </section>

        <section class="page-content container">
            <div th:each="section : ${settings.about.sections}" th:class="${section.reverse} ? 'flex-row' : 'flex-row'" th:style="${section.reverse} ? 'flex-direction: row-reverse; margin-top: 80px;' : 'margin-top: 0;'">
                <div class="about-text" th:style="${section.reverse} ? '' : 'padding-right: 40px;'">
                    <h2 style="color: var(--primary-color);" th:text="${section.title}">Section Title</h2>
                    <p th:text="${section.desc}">Section description...</p>
                </div>
                <div class="about-image">
                    <img th:src="@{${section.image}}" th:alt="${section.title}" style="border-radius: 15px; box-shadow: var(--shadow);" />
                </div>
            </div>

            <div class="content-block text-center" style="margin-top: 100px;">
                <h2 style="font-size: 36px; margin-bottom: 30px;" th:utext="${settings.about.factory.title}">Xưởng Sản Xuất Trực Tiếp</h2>
                <p style="max-width: 800px; margin: 0 auto 40px auto; font-size: 18px;" th:text="${settings.about.factory.desc}">Với xưởng sản xuất quy mô...</p>
                <div class="check-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; text-align: left;">
                    <li th:each="point : ${settings.about.factory.points}" style="font-size: 16px;" th:text="${point}">Point</li>
                </div>
            </div>
        </section>
        <!-- Dynamic CTA Banner -->
        <section class="cta-banner">
            <div class="container">
                <h2 th:text="${settings.index.cta.title}">Sẵn Sàng Kiến Tạo Không Gian Của Bạn?</h2>
                <p th:text="${settings.index.cta.subtitle}">Nhận ngay bản vẽ phác thảo và báo giá sơ bộ miễn phí...</p>
                <a th:href="@{/lien-he}" class="btn btn-primary btn-large btn-glow" style="border-radius: 50px; font-size: 18px;" th:text="${settings.index.cta.btnLabel}">Liên Hệ Tư Vấn Miễn Phí</a>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
