<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Liên Hệ | TT. Furniture Clone', description='Gửi yêu cầu thiết kế thi công nội thất của bạn hoặc đến trực tiếp showroom. Chúng tôi luôn sẵn sàng hỗ trợ!', keywords='liên hệ, thiết kế nội thất, thi công nội thất, zalo', image='/images/contact_hero.png')}"></head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main>
        <!-- Modern Hero Section for Contact -->
        <section class="interior-hero" th:style="'background-image: url(' + @{${settings.contact.hero.bgImage}} + ');'">
            <div class="hero-overlay"></div>
            <h1 th:text="${settings.contact.hero.title}">Liên Hệ Ngay</h1>
            <p class="hero-subtitle" th:text="${settings.contact.hero.subtitle}">Subtitle</p>
        </section>

        <!-- Modern Contact Layout -->
        <section class="page-content container">
            <div class="contact-modern-layout">
                
                <!-- Contact Info Cards -->
                <div class="contact-info-section" style="flex: 1; display: grid; gap: 20px;">
                    <div th:each="card : ${settings.contact.cards}" class="contact-card-modern" th:style="${card['color']} ? 'border-left-color: ' + ${card['color']} : ''">
                        <div class="icon-wrapper" th:style="${card['color']} ? 'color: ' + ${card['color']} + '; background: ' + ${card['color']} + '1a' : ''">
                            <span th:switch="${card['icon']}">
                                <svg th:case="'phone'" fill="currentColor" viewBox="0 0 24 24"><path d="M20 10.999h2C22 5.869 18.127 2 12.99 2v2C17.052 4 20 6.943 20 10.999z"/><path d="M13 8c2.103 0 3 .897 3 3h2c0-3.225-1.775-5-5-5v2zm3.422 5.443a1.001 1.001 0 0 0-1.391.043l-2.393 2.461c-.576-.11-1.734-.471-2.926-1.66-1.192-1.193-1.553-2.354-1.66-2.926l2.459-2.394a1 1 0 0 0 .043-1.391L6.859 3.513a1 1 0 0 0-1.391-.087l-2.17 1.861a1 1 0 0 0-.29.649c-.015.25-.301 6.172 4.291 10.766C11.305 20.707 16.323 21 17.705 21c.202 0 .326-.006.359-.008a.992.992 0 0 0 .648-.291l1.86-2.171a1 1 0 0 0-.086-1.391l-4.064-3.696z"/></svg>
                                <svg th:case="'zalo'" viewBox="0 0 24 24" fill="currentColor"><path d="M21.054 9.177c-.945-3.033-3.957-5.32-7.48-5.32-4.577 0-8.288 3.39-8.288 7.568 0 2.21 1.051 4.195 2.724 5.568-1.07.973-1.298 2.012-1.118 2.502.261.708 1.151.785 2.551-.252 1.34-1.01 1.8-1.157 2.193-1.157.63.14 1.284.223 1.956.223 4.577 0 8.288-3.39 8.288-7.568 0-1.066-.757-2.31-1.826-1.564z"/></svg>
                                <svg th:case="'email'" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.103 0-2 .897-2 2v12c0 1.103.897 2 2 2h16c1.103 0 2-.897 2-2V6c0-1.103-.897-2-2-2zm0 2v.511l-8 6.223-8-6.222V6h16zM4 18V9.044l7.386 5.745a.994.994 0 0 0 1.228 0L20 9.044 20.002 18H4z"/></svg>
                                <svg th:case="'map'" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C7.589 2 4 5.589 4 10c0 5.23 7.371 11.531 7.747 11.848a.5.5 0 0 0 .506 0C12.63 21.53 20 15.23 20 10c0-4.411-3.589-8-8-8zm0 18.067C10.74 18.895 5 13.57 5 10c0-3.859 3.141-7 7-7s7 3.141 7 7c0 3.57-5.74 8.895-7 10.067z"/><circle cx="12" cy="10" r="3"/></svg>
                            </span>
                        </div>
                        <div class="card-content">
                            <h3 th:text="${card['title']}">Card Title</h3>
                            <p th:text="${card['value']}">Card value</p>
                            <a th:href="@{${card['link']}}" class="card-link" th:text="${card['linkLabel']}" th:style="${card['color']} ? 'color: ' + ${card['color']} : ''">Link</a>
                        </div>
                    </div>
                </div>

                <!-- Contact Form Wrapper -->
                <div class="contact-form-wrapper" style="flex: 1.5;">
                    <div th:if="${success}" class="success-alert" style="background: #e6fffa; color: #2c7a7b; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #b2f5ea; font-weight: 600;" th:text="${success}"></div>
                    <div class="form-header">
                        <h2 th:text="${settings['contact']['form']['title']}">Bạn Cần Thiết Kế & Thi Công?</h2>
                        <p th:text="${settings['contact']['form']['subtitle']}">Kỹ sư của chúng tôi...</p>
                    </div>
                    <form th:action="@{/lien-he}" method="POST" class="modern-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Họ và tên *</label>
                                <input type="text" name="name" placeholder="Nhập họ và tên..." required />
                            </div>
                            <div class="form-group">
                                <label>Số điện thoại *</label>
                                <input type="tel" name="phone" placeholder="Nhập số điện thoại..." required />
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Loại hình công trình *</label>
                                <select name="projectType" required>
                                    <option value="" disabled selected>Chọn loại hình...</option>
                                    <option value="chung-cu">Căn hộ / Chung cư</option>
                                    <option value="nha-pho">Nhà phố / Biệt thự</option>
                                    <option value="van-phong">Văn phòng / Retail</option>
                                    <option value="khac">Khác</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Ngân sách dự kiến</label>
                                <select name="budget">
                                    <option value="" disabled selected>Chọn mức ngân sách...</option>
                                    <option value="duoi-500">Dưới 500 triệu</option>
                                    <option value="500-1-ty">500 triệu - 1 tỷ</option>
                                    <option value="tren-1-ty">Trên 1 tỷ</option>
                                    <option value="chua-ro">Chưa xác định</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Hạng mục mong muốn</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="services" value="thiet-ke"> <span>Thiết kế</span></label>
                                <label><input type="checkbox" name="services" value="thi-cong"> <span>Thi công</span></label>
                                <label><input type="checkbox" name="services" value="tron-goi" checked> <span>Trọn gói (Thiết kế + Thi công)</span></label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Lời nhắn bổ sung</label>
                            <textarea name="message" placeholder="Chia sẻ thêm về ý tưởng..." rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-large btn-glow" style="width: 100%; border-radius: 8px; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="m21.426 11.095-17-8A.999.999 0 0 0 3.03 4.242L4.969 12l-1.939 7.758a.999.999 0 0 0 1.396 1.147l17-8a.999.999 0 0 0 0-1.81zM5.322 19l1.4-5.6h7.625c.343 0 .625-.282.625-.625S14.69 12.15 14.347 12.15H6.722L5.32 6.55l14.078 6.625L5.322 19z"/></svg>
                            <span th:text="${settings['contact']['form']['btnLabel']}">Gửi Yêu Cầu Tư Vấn Ngay</span>
                        </button>
                    </form>
                </div>
            </div>
            
            <!-- Map Section -->
            <div id="map" style="margin-top: 80px; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow);">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d59587.97341857642!2d105.5186064486328!3d21.022744700000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x313459c04396b797%3A0xc608144f801666!2zQsOsbmggUGjDuiwgVGjhuqFjaCBUaOG6pXQsIEjDoCBO4buZaSwgVmnhu4d0IE5hbQ!5e0!3m2!1svi!2s!4v1711200000000!5m2!1svi!2s" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
